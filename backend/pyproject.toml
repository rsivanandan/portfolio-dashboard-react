[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "S",    # bandit (security)
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "S608",  # SQL injection (we use parameterised queries + hardcoded table names)
]

[tool.ruff.lint.per-file-ignores]
"setupdb.py" = ["S"]  # setupdb is a local-only tool
