version: "3.8"

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-dashboard:latest
    container_name: portfolio-dashboard
    ports:
      - "8081:8080"
    volumes:
      - .:/app
    environment:
      - CORS_ORIGINS=http://localhost:8081,http://192.168.1.250:8081
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
